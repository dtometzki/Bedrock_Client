<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'">
<title>Bedrock Chat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"
        integrity="sha512-xeUh+KxNyTufZOje++oQHstlMQ8/rpyzPuM+gjMFYK3z5ILJGE7l2NvYL+XfliKURMpBIKKp1XoPN/qswlSMFA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"
        integrity="sha512-jB0TkTBeQC9ZSkBqDhdmfTv1qdfbWpGE72yJ/01Srq6hEzZIz2xkz1e57p9ai7IeHMwEG7HpzG6NdptChif5Pg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
  :root {
    --bg: #262624;
    --bg-panel: #30302e;
    --bg-input: #3a3a37;
    --border: #47464233;
    --border-strong: #4a4945;
    --text: #e8e6e1;
    --text-dim: #9d9b94;
    --accent: #d97757;
    --user-bubble: #3d3d3a;
    --code-bg: #1f1f1d;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border-strong);
    background: var(--bg-panel);
    flex-wrap: wrap;
  }
  header .logo {
    color: var(--accent);
    font-size: 18px;
    font-weight: 700;
  }
  header .title { font-weight: 600; }
  header .spacer { flex: 1; }
  .chip {
    color: var(--text-dim);
    font-size: 12.5px;
    background: var(--bg-input);
    border-radius: 999px;
    padding: 3px 12px;
    white-space: nowrap;
  }
  select, button {
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 6px 12px;
    font: inherit;
    font-size: 13.5px;
    cursor: pointer;
  }
  select:hover, button:hover { border-color: var(--text-dim); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { filter: brightness(1.08); }
  button:disabled { opacity: 0.45; cursor: default; }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0 12px;
  }
  .container { max-width: 820px; margin: 0 auto; padding: 0 20px; }

  .empty {
    text-align: center;
    color: var(--text-dim);
    margin-top: 12vh;
  }
  .empty h1 { font-size: 26px; color: var(--text); font-weight: 600; }

  .msg { margin-bottom: 18px; }
  .msg.user { display: flex; justify-content: flex-end; }
  .msg.user .bubble {
    background: var(--user-bubble);
    border-radius: var(--radius);
    padding: 10px 16px;
    max-width: 75%;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.assistant .content { padding: 2px 4px; }
  .msg.assistant .content > :first-child { margin-top: 0; }
  .msg.assistant .content > :last-child { margin-bottom: 0; }
  .msg .meta {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 6px;
    padding-left: 4px;
  }
  .msg .error {
    color: #e4b463;
    background: #4a3c2333;
    border: 1px solid #e4b46344;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .notice {
    display: none;
    align-items: flex-start;
    gap: 10px;
    color: #e4b463;
    background: #4a3c2333;
    border: 1px solid #e4b46344;
    border-radius: 8px;
    padding: 10px 14px;
    margin: 12px auto 0;
    max-width: 760px;
    font-size: 13px;
    line-height: 1.4;
  }
  .notice.show { display: flex; }
  .notice .notice-close {
    margin-left: auto;
    cursor: pointer;
    color: inherit;
    background: none;
    border: none;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
  }

  details.reasoning {
    color: var(--text-dim);
    font-size: 13px;
    border-left: 2px solid var(--border-strong);
    padding-left: 12px;
    margin-bottom: 10px;
  }
  details.reasoning summary { cursor: pointer; user-select: none; }
  details.reasoning pre {
    white-space: pre-wrap;
    font: inherit;
    margin: 6px 0 0;
  }

  .content pre {
    background: var(--code-bg);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 12px 14px;
    overflow-x: auto;
    font-size: 13px;
  }
  .content code {
    background: var(--code-bg);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 13px;
  }
  .content pre code { background: none; padding: 0; }
  .content table { border-collapse: collapse; }
  .content th, .content td { border: 1px solid var(--border-strong); padding: 5px 10px; }
  .content a { color: var(--accent); }

  .cursor {
    display: inline-block;
    width: 8px; height: 16px;
    background: var(--accent);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  footer {
    padding: 8px 20px 16px;
    background: var(--bg);
  }
  .inputbox {
    max-width: 820px;
    margin: 0 auto;
    background: var(--bg-panel);
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    padding: 10px 12px;
  }
  .inputbox:focus-within { border-color: var(--text-dim); }
  textarea {
    width: 100%;
    background: none;
    border: none;
    outline: none;
    resize: none;
    color: var(--text);
    font: inherit;
    max-height: 200px;
    padding: 4px 6px;
  }
  .inputrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
  }
  .statusline {
    color: var(--text-dim);
    font-size: 12px;
    flex: 1;
    padding-left: 6px;
  }

  .attachrow {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 6px 4px;
  }
  .attachrow:empty { display: none; }
  .filechip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-input);
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 12.5px;
    color: var(--text-dim);
    max-width: 260px;
  }
  .filechip .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .filechip .remove {
    cursor: pointer;
    color: var(--text-dim);
    font-weight: 700;
    padding: 0 2px;
  }
  .filechip .remove:hover { color: var(--text); }
  #attachBtn {
    border-radius: 999px;
    width: 32px;
    height: 32px;
    padding: 0;
    font-size: 18px;
    line-height: 1;
    flex-shrink: 0;
  }
  .msg .attachments {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: flex-end;
    margin-top: 6px;
  }
  .msg .attachments .filechip { cursor: default; }
  .inputbox.dragover { border-color: var(--accent); }

  #usageOverlay {
    position: fixed;
    inset: 0;
    background: #00000088;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .modal {
    background: var(--bg-panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    width: min(560px, calc(100vw - 40px));
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border-strong);
  }
  .modal-body {
    padding: 16px 18px;
    overflow-y: auto;
    font-size: 14px;
  }
  .modal-body h3 {
    margin: 14px 0 6px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
  }
  .modal-body h3:first-child { margin-top: 0; }
  .modal-body table { width: 100%; border-collapse: collapse; }
  .modal-body td {
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .modal-body td:last-child { text-align: right; color: var(--text); }
  .modal-body td:first-child { color: var(--text-dim); padding-right: 16px; }
  .modal-body .note { color: var(--text-dim); font-size: 12px; margin-top: 12px; }
</style>
</head>
<body>
<header>
  <span class="logo">✳</span>
  <span class="title">Bedrock Chat</span>
  <select id="modelSelect" title="Modell wechseln"></select>
  <select id="effortSelect" title="Effort Level (Denk-Aufwand)"></select>
  <span class="spacer"></span>
  <span class="chip" id="accountChip">–</span>
  <button id="usageBtn" title="Kosten und Token-Nutzung anzeigen">Usage</button>
  <button id="systemBtn" title="System Prompt anzeigen/ändern">System</button>
  <button id="clearBtn" title="Verlauf leeren">Verlauf leeren</button>
</header>

<div id="usageOverlay" style="display:none">
  <div class="modal">
    <div class="modal-head">
      <strong>Usage</strong>
      <button id="usageCloseBtn">Schließen</button>
    </div>
    <div class="modal-body" id="usageBody">Lade…</div>
  </div>
</div>

<main id="main">
  <div class="notice" id="libNotice">
    <span id="libNoticeText"></span>
    <button class="notice-close" id="libNoticeClose" title="Ausblenden" aria-label="Ausblenden">×</button>
  </div>
  <div class="container" id="messages">
    <div class="empty" id="empty">
      <h1>Womit kann ich helfen?</h1>
      <p>Nachrichten gehen direkt an AWS Bedrock über dein lokales AWS-Profil.</p>
    </div>
  </div>
</main>

<footer>
  <div class="inputbox" id="inputbox">
    <div class="attachrow" id="attachRow"></div>
    <textarea id="input" rows="2" placeholder="Nachricht an Bedrock…"></textarea>
    <div class="inputrow">
      <button id="attachBtn" title="Dateien anhängen (PDF, Office, Text, Bilder)">+</button>
      <input type="file" id="fileInput" multiple style="display:none"
             accept=".pdf,.csv,.doc,.docx,.xls,.xlsx,.html,.htm,.txt,.md,.png,.jpg,.jpeg,.gif,.webp">
      <span class="statusline" id="status"></span>
      <button id="stopBtn" style="display:none">Stopp (Esc)</button>
      <button id="sendBtn" class="primary">Senden</button>
    </div>
  </div>
</footer>

<script>
(() => {
  "use strict";

  // Der Server erwartet bei aktiviertem Auth-Token dessen Wert in jedem
  // API-Request. Die Seite selbst wurde mit ?token=... geladen; wir lesen den
  // Wert aus der eigenen URL und senden ihn als Header bei jedem fetch mit.
  const AUTH_TOKEN = new URLSearchParams(location.search).get("token") || "";

  function apiFetch(url, options = {}) {
    const headers = { ...(options.headers || {}) };
    if (AUTH_TOKEN) headers["x-bedrock-token"] = AUTH_TOKEN;
    return fetch(url, { ...options, headers });
  }

  const el = {
    messages: document.getElementById("messages"),
    empty: document.getElementById("empty"),
    main: document.getElementById("main"),
    input: document.getElementById("input"),
    sendBtn: document.getElementById("sendBtn"),
    stopBtn: document.getElementById("stopBtn"),
    clearBtn: document.getElementById("clearBtn"),
    systemBtn: document.getElementById("systemBtn"),
    modelSelect: document.getElementById("modelSelect"),
    effortSelect: document.getElementById("effortSelect"),
    accountChip: document.getElementById("accountChip"),
    status: document.getElementById("status"),
    attachBtn: document.getElementById("attachBtn"),
    fileInput: document.getElementById("fileInput"),
    attachRow: document.getElementById("attachRow"),
    inputbox: document.getElementById("inputbox"),
    usageBtn: document.getElementById("usageBtn"),
    usageOverlay: document.getElementById("usageOverlay"),
    usageBody: document.getElementById("usageBody"),
    usageCloseBtn: document.getElementById("usageCloseBtn"),
    libNotice: document.getElementById("libNotice"),
    libNoticeText: document.getElementById("libNoticeText"),
    libNoticeClose: document.getElementById("libNoticeClose")
  };

  const MAX_ATTACHMENTS = 5;
  const MAX_ATTACHMENT_BYTES = 4.5 * 1000 * 1000;
  const EFFORT_LABELS = { low: "Niedrig", medium: "Mittel", high: "Hoch", max: "Max" };

  let busy = false;
  let currentSystemPrompt = "";
  let pendingAttachments = [];
  let effortSupported = false;

  // Beide Bibliotheken werden vom CDN geladen. Fehlt eine (z. B. weil ein
  // Versionswechsel den SRI-Hash ungueltig macht und der Browser das Skript
  // deshalb blockiert), rendern wir sicher als Klartext statt roher HTML.
  const markdownReady = Boolean(window.marked && window.DOMPurify);

  function renderMarkdown(text) {
    if (markdownReady) {
      return DOMPurify.sanitize(marked.parse(text));
    }
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, "<br>");
  }

  // Zeigt einmalig eine gut sichtbare Meldung, wenn die Markdown-Bibliotheken
  // nicht geladen werden konnten. Der Chat bleibt voll nutzbar (Klartext).
  function checkMarkdownLibs() {
    if (markdownReady) return;
    const missing = [!window.marked && "marked", !window.DOMPurify && "DOMPurify"]
      .filter(Boolean)
      .join(" und ");
    el.libNoticeText.textContent =
      "Formatierung eingeschraenkt: " + missing + " konnte nicht geladen werden. " +
      "Antworten werden als Klartext angezeigt. Meist liegt das an fehlender " +
      "Internetverbindung zum CDN oder an einem Versionswechsel mit unpassendem " +
      "Integritaets-Hash (SRI). Der Chat funktioniert normal weiter.";
    el.libNotice.classList.add("show");
  }

  function scrollToBottom() {
    el.main.scrollTop = el.main.scrollHeight;
  }

  function hideEmpty() {
    if (el.empty) { el.empty.remove(); el.empty = null; }
  }

  function addUserMessage(text, attachmentNames) {
    hideEmpty();
    const wrap = document.createElement("div");
    wrap.className = "msg user";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text || "(nur Anhang)";
    wrap.appendChild(bubble);
    if (attachmentNames && attachmentNames.length) {
      const row = document.createElement("div");
      row.className = "attachments";
      attachmentNames.forEach((name) => {
        const chip = document.createElement("span");
        chip.className = "filechip";
        chip.innerHTML = "📎 <span class=\"name\"></span>";
        chip.querySelector(".name").textContent = name;
        row.appendChild(chip);
      });
      bubble.after(row);
    }
    el.messages.appendChild(wrap);
    scrollToBottom();
  }

  function renderAttachRow() {
    el.attachRow.innerHTML = "";
    pendingAttachments.forEach((attachment, index) => {
      const chip = document.createElement("span");
      chip.className = "filechip";
      chip.innerHTML = "📎 <span class=\"name\"></span><span class=\"remove\" title=\"Entfernen\">×</span>";
      chip.querySelector(".name").textContent = attachment.name;
      chip.querySelector(".remove").addEventListener("click", () => {
        pendingAttachments.splice(index, 1);
        renderAttachRow();
      });
      el.attachRow.appendChild(chip);
    });
  }

  function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result).split(",", 2)[1] || "");
      reader.onerror = () => reject(new Error("Datei konnte nicht gelesen werden: " + file.name));
      reader.readAsDataURL(file);
    });
  }

  async function addFiles(fileList) {
    for (const file of fileList) {
      if (pendingAttachments.length >= MAX_ATTACHMENTS) {
        alert("Maximal " + MAX_ATTACHMENTS + " Anhänge pro Nachricht.");
        break;
      }
      if (file.size > MAX_ATTACHMENT_BYTES) {
        alert("Datei zu groß (max. 4,5 MB): " + file.name);
        continue;
      }
      try {
        const dataBase64 = await readFileAsBase64(file);
        pendingAttachments.push({ name: file.name, dataBase64 });
      } catch (err) {
        alert(err.message);
      }
    }
    renderAttachRow();
  }

  function addAssistantMessage() {
    hideEmpty();
    const wrap = document.createElement("div");
    wrap.className = "msg assistant";
    const content = document.createElement("div");
    content.className = "content";
    wrap.appendChild(content);
    el.messages.appendChild(wrap);
    return { wrap, content };
  }

  function setBusy(value) {
    busy = value;
    el.sendBtn.disabled = value;
    el.stopBtn.style.display = value ? "" : "none";
    el.modelSelect.disabled = value;
    el.effortSelect.disabled = value || !effortSupported;
    el.clearBtn.disabled = value;
    el.systemBtn.disabled = value;
    if (!value) el.status.textContent = "";
  }

  function formatUsd(value) {
    return value == null ? "n/a" : "$" + value.toFixed(4);
  }

  function applyEffort(state) {
    const model = state.models.find((entry) => entry.id === state.modelId);
    const config = model && model.effort;
    el.effortSelect.innerHTML = "";
    effortSupported = Boolean(config);

    if (!config) {
      const option = document.createElement("option");
      option.textContent = "Effort n/a";
      el.effortSelect.appendChild(option);
      el.effortSelect.disabled = true;
      el.effortSelect.title = "Dieses Modell unterstützt kein Effort Level";
      return;
    }

    el.effortSelect.title = "Effort Level (Denk-Aufwand)";
    config.levels.forEach((level) => {
      const option = document.createElement("option");
      option.value = level;
      option.textContent = "Effort: " + (EFFORT_LABELS[level] || level);
      option.selected = level === state.effort;
      el.effortSelect.appendChild(option);
    });
    el.effortSelect.disabled = busy;
  }

  function applyState(state) {
    el.modelSelect.innerHTML = "";
    state.models.forEach((model) => {
      const option = document.createElement("option");
      option.value = model.id;
      option.textContent = model.label;
      option.selected = model.id === state.modelId;
      el.modelSelect.appendChild(option);
    });
    applyEffort(state);
    const account = [state.profile, state.region, state.identityLabel]
      .filter(Boolean).join(" · ");
    el.accountChip.textContent = account || "–";
    currentSystemPrompt = state.systemPrompt || "";
    el.messages.querySelectorAll(".msg").forEach((node) => node.remove());
    if (state.messages.length) hideEmpty();
    state.messages.forEach((message) => {
      if (message.role === "user") {
        addUserMessage(message.text, message.attachments);
      } else {
        const { content } = addAssistantMessage();
        content.innerHTML = renderMarkdown(message.text);
      }
    });
    scrollToBottom();
  }

  async function loadState() {
    const response = await apiFetch("/api/state");
    applyState(await response.json());
  }

  async function postJson(url, payload) {
    const response = await apiFetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload || {})
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(data.error || response.statusText);
    return data;
  }

  async function sendMessage() {
    const text = el.input.value.trim();
    if ((!text && !pendingAttachments.length) || busy) return;

    const attachments = pendingAttachments;
    pendingAttachments = [];
    renderAttachRow();
    el.input.value = "";
    el.input.style.height = "auto";
    setBusy(true);
    addUserMessage(text, attachments.map((attachment) => attachment.name));

    const { content } = addAssistantMessage();
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    content.appendChild(cursor);
    scrollToBottom();

    let answer = "";
    let reasoning = "";
    let reasoningEl = null;
    let meta = null;

    const renderAnswer = () => {
      content.innerHTML = renderMarkdown(answer);
      content.appendChild(cursor);
    };

    const handleEvent = (event) => {
      if (event.type === "text") {
        answer += event.text;
        renderAnswer();
      } else if (event.type === "reasoning") {
        if (!reasoningEl) {
          reasoningEl = document.createElement("details");
          reasoningEl.className = "reasoning";
          reasoningEl.innerHTML = "<summary>Reasoning</summary><pre></pre>";
          content.parentNode.insertBefore(reasoningEl, content);
        }
        reasoning += event.text;
        reasoningEl.querySelector("pre").textContent = reasoning;
      } else if (event.type === "retry") {
        el.status.textContent = "Erneuter Versuch " + event.attempt + "/" +
          event.maxRetries + " in " + event.delayMs + " ms…";
      } else if (event.type === "error") {
        const box = document.createElement("div");
        box.className = "error";
        box.textContent = "API Fehler: " + event.message;
        content.parentNode.appendChild(box);
      } else if (event.type === "done") {
        meta = event;
      }
      scrollToBottom();
    };

    try {
      const response = await apiFetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, attachments: attachments })
      });

      if (!response.ok || !response.body) {
        const data = await response.json().catch(() => ({}));
        throw new Error(data.error || response.statusText);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split("\n\n");
        buffer = parts.pop();
        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith("data:")) continue;
          try {
            handleEvent(JSON.parse(line.slice(5)));
          } catch {}
        }
      }
    } catch (err) {
      const box = document.createElement("div");
      box.className = "error";
      box.textContent = "Fehler: " + err.message;
      content.parentNode.appendChild(box);
    }

    cursor.remove();
    content.innerHTML = renderMarkdown(answer);

    const metaEl = document.createElement("div");
    metaEl.className = "meta";
    const metaParts = [];
    if (meta && meta.aborted) metaParts.push("Antwort abgebrochen");
    if (meta && meta.usage) {
      metaParts.push(meta.usage.totalTokens.toLocaleString("de-DE") + " Tokens");
      metaParts.push("Schätzung " + formatUsd(meta.usage.costUsd));
      if (meta.usage.latencyMs) metaParts.push(meta.usage.latencyMs + " ms");
    }
    if (metaParts.length) {
      metaEl.textContent = metaParts.join(" · ");
      content.parentNode.appendChild(metaEl);
    }

    setBusy(false);
    scrollToBottom();
    el.input.focus();
  }

  async function abortRequest() {
    try { await postJson("/api/abort"); } catch {}
  }

  function formatInt(value) {
    return Number(value || 0).toLocaleString("de-DE");
  }

  function usageRow(label, value) {
    const row = document.createElement("tr");
    const labelCell = document.createElement("td");
    labelCell.textContent = label;
    const valueCell = document.createElement("td");
    valueCell.textContent = value;
    row.append(labelCell, valueCell);
    return row;
  }

  function usageSection(title, rows) {
    const heading = document.createElement("h3");
    heading.textContent = title;
    const table = document.createElement("table");
    rows.forEach((row) => table.appendChild(row));
    return [heading, table];
  }

  function renderUsage(data) {
    el.usageBody.innerHTML = "";
    const billing = data.billing || {};
    const session = data.session || {};

    const billingRows = billing.error
      ? [usageRow("Kosten", "n/a"), usageRow("Hinweis", billing.error.split("\n")[0])]
      : [
          usageRow("Kosten", formatUsd(billing.amount) + " " + (billing.unit || "USD") +
            (billing.estimated ? " (AWS Estimated)" : "")),
          usageRow("Zeitraum", billing.period ? billing.period.label : "–")
        ];
    el.usageBody.append(...usageSection("AWS Billing (Bedrock, aktueller Monat)", billingRows));

    if (!session.requests) {
      const note = document.createElement("p");
      note.textContent = "Noch keine Bedrock-Nutzung in dieser Session.";
      el.usageBody.appendChild(note);
    } else {
      if (session.last) {
        el.usageBody.append(...usageSection("Letzte Antwort (" + session.last.modelLabel + ")", [
          usageRow("Input", formatInt(session.last.inputTokens) + " Tokens"),
          usageRow("Output", formatInt(session.last.outputTokens) + " Tokens"),
          usageRow("Gesamt", formatInt(session.last.totalTokens) + " Tokens"),
          usageRow("Schätzung", formatUsd(session.last.costUsd)),
          usageRow("Latenz", session.last.latencyMs ? session.last.latencyMs + " ms" : "n/a")
        ]));
      }
      el.usageBody.append(...usageSection("Session (" + formatInt(session.requests) + " Requests)", [
        usageRow("Input", formatInt(session.inputTokens) + " Tokens"),
        usageRow("Output", formatInt(session.outputTokens) + " Tokens"),
        usageRow("Gesamt", formatInt(session.totalTokens) + " Tokens"),
        usageRow("Schätzung", formatUsd(session.costUsd))
      ]));
      if (session.byModel && session.byModel.length > 1) {
        el.usageBody.append(...usageSection("Nach Modell", session.byModel.map((entry) =>
          usageRow(entry.modelLabel, formatInt(entry.totalTokens) + " Tokens, " +
            formatUsd(entry.costUsd) + (entry.hasUnknownCost ? "+" : ""))
        )));
      }
    }

    const note = document.createElement("p");
    note.className = "note";
    note.textContent = "Session-Kosten sind eine Token-Schätzung; AWS Billing ist der Cost-Explorer-Wert für Amazon Bedrock.";
    el.usageBody.appendChild(note);
  }

  async function openUsage() {
    el.usageOverlay.style.display = "";
    el.usageBody.textContent = "Lade… (AWS Cost Explorer kann einige Sekunden brauchen)";
    try {
      const response = await apiFetch("/api/usage");
      if (!response.ok) throw new Error(response.statusText);
      renderUsage(await response.json());
    } catch (err) {
      el.usageBody.textContent = "Usage konnte nicht geladen werden: " + err.message;
    }
  }

  el.sendBtn.addEventListener("click", sendMessage);
  el.stopBtn.addEventListener("click", abortRequest);
  el.usageBtn.addEventListener("click", openUsage);
  el.usageCloseBtn.addEventListener("click", () => { el.usageOverlay.style.display = "none"; });
  el.usageOverlay.addEventListener("click", (event) => {
    if (event.target === el.usageOverlay) el.usageOverlay.style.display = "none";
  });

  el.attachBtn.addEventListener("click", () => el.fileInput.click());
  el.fileInput.addEventListener("change", async () => {
    await addFiles(Array.from(el.fileInput.files));
    el.fileInput.value = "";
  });
  el.inputbox.addEventListener("dragover", (event) => {
    event.preventDefault();
    el.inputbox.classList.add("dragover");
  });
  el.inputbox.addEventListener("dragleave", () => el.inputbox.classList.remove("dragover"));
  el.inputbox.addEventListener("drop", async (event) => {
    event.preventDefault();
    el.inputbox.classList.remove("dragover");
    if (event.dataTransfer?.files?.length) {
      await addFiles(Array.from(event.dataTransfer.files));
    }
  });

  el.input.addEventListener("keydown", (event) => {
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      sendMessage();
    }
  });
  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      if (el.usageOverlay.style.display !== "none") {
        el.usageOverlay.style.display = "none";
      } else if (busy) {
        abortRequest();
      }
    }
  });
  el.input.addEventListener("input", () => {
    el.input.style.height = "auto";
    el.input.style.height = Math.min(el.input.scrollHeight, 200) + "px";
  });

  el.modelSelect.addEventListener("change", async () => {
    try {
      const state = await postJson("/api/model", { model: el.modelSelect.value });
      applyState(state);
    } catch (err) {
      alert(err.message);
      loadState();
    }
  });

  el.effortSelect.addEventListener("change", async () => {
    try {
      applyState(await postJson("/api/effort", { effort: el.effortSelect.value }));
    } catch (err) {
      alert(err.message);
      loadState();
    }
  });

  el.clearBtn.addEventListener("click", async () => {
    if (!confirm("Verlauf wirklich leeren?")) return;
    try {
      applyState(await postJson("/api/clear"));
    } catch (err) {
      alert(err.message);
    }
  });

  el.systemBtn.addEventListener("click", async () => {
    const value = prompt("System Prompt (leer = kein System Prompt):", currentSystemPrompt);
    if (value === null) return;
    try {
      applyState(await postJson("/api/system", { system: value }));
    } catch (err) {
      alert(err.message);
    }
  });

  el.libNoticeClose.addEventListener("click", () => {
    el.libNotice.classList.remove("show");
  });

  checkMarkdownLibs();
  loadState().catch((err) => {
    el.status.textContent = "Status konnte nicht geladen werden: " + err.message;
  });
  el.input.focus();
})();
</script>
</body>
</html>
